<div class="main-content">
    <div class="events-card">

        <div class="table-header">
            <h2 class="header">Device</h2>

            <div class="search-container">
                <div class="search-box">
                    <img src="assets/search.png" alt="search" class="search-icon">
                    <input type="text" placeholder="Search">
                </div>
            </div>

            <div class="action-icons">
                <button class="icon-btn needs-circle"><img src="assets/add.png"></button>
                <button class="icon-btn needs-circle"><img src="assets/download.png"></button>
                <button class="icon-btn"><img src="assets/reloading.png"></button>
            </div>
        </div>

        <div class="table-wrapper">

            <table class="custom-table">
                <thead>
                    <tr>
                        <th>Sl. No</th>
                        <th>Model</th>
                        <th>Type</th>
                        <th>Unique ID (MAC)</th>
                        <th>Project</th>
                        <th>Country</th>
                        <th>Area</th>
                        <th>Building</th>
                        <th>Floor</th>
                        <th>Zone</th>
                        <th class="text-center">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr *ngFor="let device of deviceData">
                        <td>{{ device.Sl_No }}</td>
                        <td class="name-column">{{ device.Model }}</td>
                        <td>
                            <span class="type-badge" [class.mobile]="device.Type === 'Mobile'">
                                {{ device.Type }}
                            </span>
                        </td>
                        <td><code>{{ device.Unique_Id }}</code></td>
                        <td>{{ device.Project }}</td>
                        <td>{{ device.Country }}</td>
                        <td>{{ device.Area }}</td>
                        <td>{{ device.Building }}</td>
                        <td>{{ device.Floor }}</td>
                        <td><strong>{{ device.Zone }}</strong></td>
                        <td class="action-cell">
                            <div class="action-wrapper">
                                <img src="assets/edit.png" class="table-icon" title="Edit">
                                <img src="assets/del.png" class="table-icon" title="Delete">
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>

        </div>
    </div>
</div>
