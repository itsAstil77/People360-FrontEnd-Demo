<div class="main-content">
  <div class="events-card">
    
    <div class="table-header">
      <h2 class="header">Equipment-Master</h2>
      
      <div class="search-container">
        <div class="search-box">
          <img src="assets/search.png" alt="search" class="search-icon">
          <input type="text" placeholder="Search">
        </div>
      </div>

      <div class="action-icons">
        <button class="icon-btn"><img src="assets/add.png"></button>
        <button class="icon-btn needs-circle"><img src="assets/download.png"></button>
        <button class="icon-btn"><img src="assets/reloading.png"></button>
      </div>
    </div>

    <div class="table-wrapper">
    <table>
    <thead>
      <tr>
        <th>Asset ID</th>
        <th>Equipment Name</th>
        <th>Type</th>
        <th>S/N</th>
        <th>Location (OT)</th>
        <th>Tag ID</th>
        <th>Service Date</th>
        <th>Status</th>
       <th class="text-center">Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let eq of equipmentData">
        <td><strong>{{ eq.Equipment_ID }}</strong></td>
        <td class="name-column">{{ eq.Equipment_Name }}</td>
        <td><span class="type-label">{{ eq.Equipment_Type }}</span></td>
        <td><code>{{ eq.Serial_Number }}</code></td>
        <td class="ot-link">{{ eq.Assigned_OT }}</td>
        <td>{{ eq.Tag_ID || 'N/A' }}</td>
        <td>{{ eq.Last_Service_Date }}</td>
        <td>
          <span class="status-badge" [attr.data-status]="eq.Status">
            {{ eq.Status }}
          </span>
        </td>
        <td class="action-cell">
        <div class="action-wrapper">
          <img src="assets/edit.png" class="table-icon" title="Edit">
          <img src="assets/del.png" class="table-icon" title="Delete">
        </div>
      </td>
      </tr>
    </tbody>
  </table>
    </div>
  </div>
</div>
