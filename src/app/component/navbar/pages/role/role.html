<div class="main-content">
  <div class="events-card">
    <div class="table-header">
      <h2 class="header">Role Master</h2>
      <div class="search-container">
        <div class="search-box">
          <img src="assets/search.png" alt="search" class="search-icon">
          <input type="text" placeholder="Search Roles">
        </div>
      </div>
      <div class="action-icons">
        <button class="icon-btn" routerLink="/createrole"><img src="assets/add.png"></button>
        <button class="icon-btn needs-circle"><img src="assets/download1.png"></button>
        <button class="icon-btn"><img src="assets/reloading.png"></button>
      </div>
    </div>

    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>Role Id</th>
            <th>Role Name</th>
            <th>Description</th>
            <th>Access Permission</th>
            <th class="text-center">Action</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let role of roleData">
            <td>{{ role.roleId }}</td>
            <td><strong>{{ role.roleName }}</strong></td>
            <td>{{ role.description }}</td>
            <td>
              <span class="access-badge">{{ role.permission }}</span>
            </td>
            <td class="action-cell">
              <div class="action-wrapper">
                <img src="assets/edit.png" class="table-icon" title="Edit">
                <img src="assets/del.png" class="table-icon" title="Delete">
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
